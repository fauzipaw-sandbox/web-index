<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fauzi's Link Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; /* Soft slate background */
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 text-slate-800">
    
    <div class="max-w-md w-full space-y-8 bg-white/60 backdrop-blur-md p-8 rounded-3xl shadow-sm border border-slate-100">
        
        <div class="text-center">
            <img class="mx-auto h-24 w-24 rounded-full shadow-md border-4 border-white object-cover" 
                 src="https://ui-avatars.com/api/?name=Fauzi+Ramdani&background=c7d2fe&color=3730a3&bold=true" 
                 alt="Fauzi Ramdani">
            <h1 class="mt-4 text-2xl font-bold text-slate-700 tracking-tight">Fauzi Ramdani</h1>
            <p class="text-sm text-slate-500 mt-1 font-medium">Network Operation & Data Enthusiast</p>
        </div>

        <div id="links-container" class="space-y-4">
            <p class="text-center text-sm text-slate-500">Memuat link...</p>
        </div>

        <script>
            async function loadLinks() {
                const container = document.getElementById('links-container');
                try {
                    // Manggil API Python yang udah kita bikin
                    const response = await fetch('/api/links');
                    const links = await response.json();
                    
                    container.innerHTML = ''; // Bersihin loading text
                    
                    // Looping data dari database buat ngebentuk tombol
                    links.forEach(link => {
                        const a = document.createElement('a');
                        a.href = link.url;
                        a.target = "_blank";
                        a.className = "group flex items-center justify-center w-full py-3.5 px-4 bg-white rounded-2xl shadow-sm hover:shadow-md transition-all duration-300 border border-slate-100 hover:-translate-y-1 hover:border-indigo-200";
                        
                        a.innerHTML = `<span class="font-medium text-slate-600 group-hover:text-indigo-600 transition-colors">${link.title}</span>`;
                        
                        container.appendChild(a);
                    });
                } catch (error) {
                    console.error("Gagal narik data:", error);
                    container.innerHTML = '<p class="text-center text-sm text-red-400">Gagal memuat link.</p>';
                }
            }
            
            // Jalanin fungsi pas halaman dibuka
            loadLinks();
        </script>

        <div class="pt-6 mt-6 border-t border-slate-100 text-center">
           <p class="text-xs text-slate-400 font-medium tracking-wide">Deployed with 🚀 on Vercel</p>
        </div>
    </div>

</body>
</html>
